name: Build and Release Skill ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
      - 'figma-variables-tokens-generator/**'
      - 'token-import-plugin-figma/**'
      - '.github/workflows/release.yml'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP archives
        run: |
          cd figma-variables-tokens-generator
          zip -r ../figma-variables-tokens-generator.zip . -x "*.DS_Store"
          cd ../token-import-plugin-figma
          zip -r ../token-import-plugin-figma.zip . -x "*.DS_Store" "node_modules/*"
          cd ..

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Skill Release
          body: "Automated build of the Figma Variables Tokens Generator Skill."
          files: |
            figma-variables-tokens-generator.zip
            token-import-plugin-figma.zip
          make_latest: true
