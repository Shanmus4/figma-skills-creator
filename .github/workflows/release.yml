name: Build and Release Skill ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP archives
        run: |
          cd figma-variables-tokens-generator
          zip -r ../figma-variables-tokens-generator.zip . -x "*.DS_Store"
          cd ../token-import-plugin-figma
          zip -r ../token-import-plugin-figma.zip . -x "*.DS_Store" "node_modules/*"
          cd ..

      - name: Get Tag Message
        id: tag_message
        run: |
          git fetch --tags --force
          # Extract tag message (handling multi-line)
          MESSAGE=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: Figma Variables Tokens Generator ${{ github.ref_name }}
          body: ${{ steps.tag_message.outputs.body }}
          files: |
            figma-variables-tokens-generator.zip
            token-import-plugin-figma.zip
          make_latest: true
